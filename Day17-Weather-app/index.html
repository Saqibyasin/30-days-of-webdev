<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App 🌤️</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <div class="app-header">
      <h1>⚡ Weather</h1>
      <p>Real time weather anywhere in the world</p>
    </div>

    <!-- SEARCH -->
    <div class="search-area">
      <div class="search-box">
        <input
          type="text"
          id="city-input"
          placeholder="Search city..."
          autocomplete="off"
        />
        <button id="search-btn">🔍</button>
      </div>
      <div id="error-msg" class="error-msg hidden">
        City not found! Please try again 🌍
      </div>
    </div>

    <!-- LOADING -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Fetching weather data...</p>
    </div>

    <!-- WEATHER CARD -->
    <div id="weather-card" class="weather-card hidden">

      <!-- CITY INFO -->
      <div class="city-info">
        <div>
          <h2 id="city-name">Srinagar</h2>
          <p id="city-country">IN · Kashmir</p>
        </div>
        <div class="weather-icon" id="weather-icon">🌨️</div>
      </div>

      <!-- TEMPERATURE -->
      <div class="temp-section">
        <div class="temp-main" id="temp-main">-2°C</div>
        <div class="temp-desc" id="temp-desc">Light Snow</div>
        <div class="temp-feels" id="temp-feels">Feels like -6°C</div>
      </div>

      <!-- WEATHER DETAILS -->
      <div class="weather-details">
        <div class="detail-item">
          <span class="detail-icon">💧</span>
          <span class="detail-value" id="humidity">80%</span>
          <span class="detail-label">Humidity</span>
        </div>
        <div class="detail-item">
          <span class="detail-icon">💨</span>
          <span class="detail-value" id="wind-speed">12 km/h</span>
          <span class="detail-label">Wind</span>
        </div>
        <div class="detail-item">
          <span class="detail-icon">👁️</span>
          <span class="detail-value" id="visibility">5 km</span>
          <span class="detail-label">Visibility</span>
        </div>
        <div class="detail-item">
          <span class="detail-icon">🌡️</span>
          <span class="detail-value" id="feels-like">-6°C</span>
          <span class="detail-label">Feels Like</span>
        </div>
      </div>

      <!-- MIN MAX -->
      <div class="min-max">
        <div class="min-max-item">
          <span>↑ High</span>
          <span id="temp-max">-1°C</span>
        </div>
        <div class="divider"></div>
        <div class="min-max-item">
          <span>↓ Low</span>
          <span id="temp-min">-4°C</span>
        </div>
      </div>

    </div>

    <!-- SEARCH HISTORY -->
    <div id="history-section" class="history-section hidden">
      <h3>Recent Searches</h3>
      <div id="history-list" class="history-list"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
